# BKK Nettleie
# Energiledd øre/kWh	Dag (06-22)	Natt og helg/helligdag
# Januar-mars	        47,38	      35,58
# April-desember	    55,73	      43,93

template:
  - !include templates/bir.yaml

  - sensor:
      - unique_id: 0a65dbd0-dc0b-463e-924c-765e32a08266
        name: "Nettleie BKK"
        unit_of_measurement: "NOK/kWh"
        icon: mdi:currency-usd
        state: >
          {% if now().hour >=6 and now().hour < 23 %}
            0.5573
          {%else%}
            0.4398
          {% endif %}

  - sensor:
      - name: Brume 3 (MT-5000)
        icon: mdi:lan-connect
        state: >
          {% if is_state('device_tracker.unifi_ijjc23er_94_83_c4_c6_1a_fd', 'home') %}
            Connected
          {% else %}
            Disconnected
          {% endif %}
