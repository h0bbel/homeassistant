trigger:
  - platform: time_pattern
    hours: "/1"

sensor:
  - name: "Next Matavfall"
    state: >
      {% set cal = states.calendar.bir_matavfall %}
      {% if cal and cal.attributes.start_time %}
        {% set start = as_timestamp(cal.attributes.start_time) %}
        {% set days = ((start - now().timestamp()) // 86400) | int %}
        {% if days <= 0 %}
          {{ start | timestamp_custom('%d %b') }} (today)
        {% elif days == 1 %}
          {{ start | timestamp_custom('%d %b') }} (tomorrow)
        {% else %}
          {{ start | timestamp_custom('%d %b') }} (in {{ days }} days)
        {% endif %}
      {% else %}
        Unknown
      {% endif %}

