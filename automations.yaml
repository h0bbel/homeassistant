- id: '1602153397652'
  alias: Turn off lights when Plex playing on Samsung 65
  description: ''
  trigger:
  - platform: state
    from: idle
    to: playing
    entity_id: media_player.plex_plex_for_samsung_tv_2020
  condition: []
  action:
  - type: turn_off
    device_id: 03df33be4bb64fcfa21c16af5279aa1d
    entity_id: light.hue_ambiance_pendant_1
    domain: light
  mode: single
- id: '1618902213502'
  alias: Toggle Cloud Light
  description: ''
  trigger:
  - platform: webhook
    webhook_id: '100'
  condition: []
  action:
  - type: toggle
    device_id: 62f13da49d37122422a99fd9a0672db8
    entity_id: switch.verisure_switch
    domain: switch
  mode: single
- id: '1624346947824'
  alias: Restore Samba Backup sensor on startup
  trigger:
  - event: start
    platform: homeassistant
  action:
  - service: hassio.addon_stdin
    data:
      addon: 15d21743_samba_backup
      input: restore-sensor
  mode: single
- id: '1674202038324'
  alias: Low battery level detection & notification for all battery sensors
  description: ''
  use_blueprint:
    path: sbyx/low-battery-level-detection-notification-for-all-battery-sensors.yaml
    input:
      actions:
      - service: notify.mobile_app_christians_iphone_2
        data:
          message: '{{sensors|replace(", ", "\n")}}'
          title: Low Battery Warning
      threshold: 10
      exclude:
        entity_id:
        - sensor.christians_iphone_2_battery_level
