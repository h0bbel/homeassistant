- id: '1602153397652'
  alias: Turn off lights when Plex playing on Samsung 65
  description: ''
  trigger:
  - platform: state
    from: idle
    to: playing
    entity_id: media_player.plex_plex_for_samsung_tv_2020
  condition: []
  action:
  - type: turn_off
    device_id: 03df33be4bb64fcfa21c16af5279aa1d
    entity_id: light.hue_ambiance_pendant_1
    domain: light
  mode: single
- id: '1618902213502'
  alias: Toggle Cloud Light
  description: ''
  trigger:
  - platform: webhook
    webhook_id: '100'
    allowed_methods:
    - POST
    - PUT
    local_only: true
  condition: []
  action:
  - type: toggle
    device_id: 62f13da49d37122422a99fd9a0672db8
    entity_id: switch.verisure_switch
    domain: switch
  mode: single
- id: '1624346947824'
  alias: Restore Samba Backup sensor on startup
  trigger:
  - event: start
    platform: homeassistant
  action:
  - service: hassio.addon_stdin
    data:
      addon: 15d21743_samba_backup
      input: restore-sensor
  mode: single
- id: '1674202038324'
  alias: Low battery level detection & notification for all battery sensors
  description: ''
  use_blueprint:
    path: sbyx/low-battery-level-detection-notification-for-all-battery-sensors.yaml
    input:
      actions:
      - service: notify.mobile_app_christians_iphone_2
        data:
          message: '{{sensors|replace(", ", "\n")}}'
          title: Low Battery Warning
      threshold: 10
      exclude:
        entity_id:
        - sensor.christians_iphone_2_battery_level
- id: '1679658995046'
  alias: Mount Synology
  description: ''
  trigger:
  - platform: homeassistant
    event: start
  condition: []
  action:
  - service: shell_command.mount_syn_folder
    data: {}
  mode: single
- id: '1683188694035'
  alias: HA Update Notifications
  description: ''
  use_blueprint:
    path: mdegat01/update_notifications.yaml
    input:
      update_entities:
      - update.home_assistant_core_update
      - update.home_assistant_operating_system_update
      - update.home_assistant_supervisor_update
      mobile_app_device: d6f5bb00c6bd80e6f8447e4fe02bf809
      run_config_check: true
      reminder_hours: None
- id: '1683204444816'
  alias: Coffee Auto Off
  description: Automatically turn off coffee maker
  trigger:
  - platform: device
    type: turned_on
    device_id: 1c5072647c6046a0bc2c740d7da0b1d5
    entity_id: switch.coffee_machine_outlet
    domain: switch
    for:
      hours: 0
      minutes: 15
      seconds: 0
  condition: []
  action:
  - service: switch.turn_off
    data: {}
    target:
      device_id: 1c5072647c6046a0bc2c740d7da0b1d5
  - service: notify.mobile_app_christians_iphone_2
    data:
      message: Automatic Turn off!
      title: ☕️ ☕️ ☕️
  mode: single
